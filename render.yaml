services:
  - type: web
    name: powerbi-action-clean
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: ACTION_API_KEY
        sync: false
      - key: MAX_UPLOAD_MB
        value: "25"
